version: "3.9"

services:
  api:
    build: .
    container_name: tender-intelligence-api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./data:/app/data
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: .
    container_name: tender-intelligence-ui
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - api
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
